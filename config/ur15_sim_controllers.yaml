controller_manager:
  ros__parameters:
    update_rate: 500  # Hz

    # --- Standard controllers (available in Gazebo) ---
    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster
    joint_trajectory_controller:
      type: joint_trajectory_controller/JointTrajectoryController
    forward_effort_controller:
      type: effort_controllers/JointGroupEffortController
    forward_position_controller:
      type: position_controllers/JointGroupPositionController
    forward_velocity_controller:
      type: velocity_controllers/JointGroupVelocityController

    # --- CRISP controllers ---
    crisp_twist_broadcaster:
      type: crisp_controllers/TwistBroadcaster
    crisp_pose_broadcaster:
      type: crisp_controllers/PoseBroadcaster
    crisp_gravity_compensation:
      type: crisp_controllers/CartesianController
    cartesian_impedance_controller:
      type: crisp_controllers/CartesianController
    joint_impedance_controller:
      type: crisp_controllers/CartesianController

    enforce_command_limits: false

# ============================================================
# Standard controller parameters
# ============================================================

joint_state_broadcaster:
  ros__parameters:
    use_local_topics: false

joint_trajectory_controller:
  ros__parameters:
    joints:
      - shoulder_pan_joint
      - shoulder_lift_joint
      - elbow_joint
      - wrist_1_joint
      - wrist_2_joint
      - wrist_3_joint
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
    state_publish_rate: 100.0
    action_monitor_rate: 20.0
    allow_partial_joints_goal: false
    constraints:
      stopped_velocity_tolerance: 0.2
      goal_time: 0.0

forward_effort_controller:
  ros__parameters:
    joints:
      - shoulder_pan_joint
      - shoulder_lift_joint
      - elbow_joint
      - wrist_1_joint
      - wrist_2_joint
      - wrist_3_joint
    interface_name: effort

forward_position_controller:
  ros__parameters:
    joints:
      - shoulder_pan_joint
      - shoulder_lift_joint
      - elbow_joint
      - wrist_1_joint
      - wrist_2_joint
      - wrist_3_joint
    interface_name: position

forward_velocity_controller:
  ros__parameters:
    joints:
      - shoulder_pan_joint
      - shoulder_lift_joint
      - elbow_joint
      - wrist_1_joint
      - wrist_2_joint
      - wrist_3_joint
    interface_name: velocity

# ============================================================
# CRISP Broadcaster parameters
# ============================================================

crisp_twist_broadcaster:
  ros__parameters:
    joints:
      - shoulder_pan_joint
      - shoulder_lift_joint
      - elbow_joint
      - wrist_1_joint
      - wrist_2_joint
      - wrist_3_joint
    end_effector_frame: tool0
    base_frame: base_link

crisp_pose_broadcaster:
  ros__parameters:
    joints:
      - shoulder_pan_joint
      - shoulder_lift_joint
      - elbow_joint
      - wrist_1_joint
      - wrist_2_joint
      - wrist_3_joint
    end_effector_frame: tool0
    base_frame: base_link

# ============================================================
# CRISP Controller parameters (simulation)
# ============================================================

# In simulation, Gazebo does NOT compensate gravity or Coriolis internally
# (unlike real UR firmware). CRISP must handle these via Pinocchio.
# Therefore use_gravity_compensation and use_coriolis_compensation are TRUE.

crisp_gravity_compensation:
  ros__parameters:
    joints:
      - shoulder_pan_joint
      - shoulder_lift_joint
      - elbow_joint
      - wrist_1_joint
      - wrist_2_joint
      - wrist_3_joint
    end_effector_frame: tool0
    base_frame: base_link
    filter:
      q: 0.2
      dq: 0.2
      output_torque: 1.0
    task:
      k_pos_x: 0.0
      k_pos_y: 0.0
      k_pos_z: 0.0
      d_pos_x: 80.0
      d_pos_y: 80.0
      d_pos_z: 80.0
      k_rot_x: 0.0
      k_rot_y: 0.0
      k_rot_z: 0.0
      d_rot_x: 15.0
      d_rot_y: 15.0
      d_rot_z: 15.0
    nullspace:
      stiffness: 5.0
      damping: 10.0
      max_tau: 5.0
    max_delta_tau: 100.0
    stop_commands: false
    use_friction: false
    use_coriolis_compensation: true   # Sim has no internal Coriolis comp
    use_gravity_compensation: true    # Sim has no internal gravity comp
    use_local_jacobian: true
    limit_error: true
    limit_torques: true
    log:
      computed_torques: true

cartesian_impedance_controller:
  ros__parameters:
    joints:
      - shoulder_pan_joint
      - shoulder_lift_joint
      - elbow_joint
      - wrist_1_joint
      - wrist_2_joint
      - wrist_3_joint
    end_effector_frame: tool0
    base_frame: base_link
    filter:
      q: 0.5
      dq: 0.5
      output_torque: 1.0
    task:
      k_pos_x: 300.0
      k_pos_y: 300.0
      k_pos_z: 300.0
      d_pos_x: 300.0
      d_pos_y: 300.0
      d_pos_z: 300.0
      k_rot_x: 20.0
      k_rot_y: 20.0
      k_rot_z: 20.0
      d_rot_x: 20.0
      d_rot_y: 20.0
      d_rot_z: 20.0
    nullspace:
      stiffness: 5.0
      damping: 15.0
    max_delta_tau: 100.0
    use_friction: false
    use_coriolis_compensation: true   # Sim has no internal Coriolis comp
    use_gravity_compensation: true    # Sim has no internal gravity comp
    use_local_jacobian: true
    limit_error: true
    limit_torques: true

joint_impedance_controller:
  ros__parameters:
    joints:
      - shoulder_pan_joint
      - shoulder_lift_joint
      - elbow_joint
      - wrist_1_joint
      - wrist_2_joint
      - wrist_3_joint
    end_effector_frame: tool0
    base_frame: base_link
    filter:
      q: 0.5
      dq: 0.5
      output_torque: 1.0
    task:
      k_pos_x: 0.0
      k_pos_y: 0.0
      k_pos_z: 0.0
      k_rot_x: 0.0
      k_rot_y: 0.0
      k_rot_z: 0.0
    max_delta_tau: 100.0
    nullspace:
      stiffness: 10.0
      projector_type: none
      damping: 8.0
      max_tau: 50.0
      regularization: 1.0e-06
      weights:
        shoulder_pan_joint.value: 5.0
        shoulder_lift_joint.value: 5.0
        elbow_joint.value: 5.0
        wrist_1_joint.value: 1.0
        wrist_2_joint.value: 1.0
        wrist_3_joint.value: 1.0
    use_friction: false
    use_coriolis_compensation: true   # Sim has no internal Coriolis comp
    use_gravity_compensation: true    # Sim has no internal gravity comp
    use_local_jacobian: true
    limit_error: true
    limit_torques: true
