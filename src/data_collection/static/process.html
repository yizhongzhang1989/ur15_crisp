<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Process Data — UR15</title>
    <style>
        :root {
            --bg: #1a1a2e; --card: #16213e; --accent: #0f3460;
            --blue: #4fc3f7; --green: #66bb6a; --orange: #ffa726;
            --red: #ef5350; --dim: #78909c; --text: #e0e0e0;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; min-height: 100vh; }

        .header {
            background: var(--card); border-bottom: 2px solid var(--accent);
            padding: 10px 20px; display: flex; align-items: center; gap: 16px;
        }
        .header h1 { font-size: 16px; color: var(--blue); }
        .header a { color: var(--dim); text-decoration: none; font-size: 13px; }
        .header a:hover { color: var(--blue); }

        .content { max-width: 1000px; margin: 20px auto; padding: 0 20px; }
        .card {
            background: var(--card); border: 1px solid var(--accent);
            border-radius: 8px; padding: 16px 20px; margin-bottom: 14px;
        }
        .card h2 { font-size: 15px; color: var(--blue); margin-bottom: 10px; }

        table { width: 100%; border-collapse: collapse; font-size: 12px; }
        th { text-align: left; color: var(--dim); padding: 4px 8px; border-bottom: 1px solid var(--accent); font-size: 11px; text-transform: uppercase; }
        td { padding: 4px 8px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        tr:hover { background: rgba(79,195,247,0.05); }

        .btn {
            padding: 8px 18px; border: none; border-radius: 5px;
            font-size: 13px; cursor: pointer; font-weight: 600;
        }
        .btn-primary { background: var(--blue); color: #000; }
        .btn-primary:hover { background: #29b6f6; }
        .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
        .btn-danger { background: var(--red); color: #fff; }

        .stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 10px; }
        .stat-box {
            background: var(--bg); border-radius: 6px; padding: 8px 10px; text-align: center;
        }
        .stat-box .label { font-size: 10px; color: var(--dim); text-transform: uppercase; }
        .stat-box .value { font-size: 18px; font-weight: 700; color: var(--blue); font-family: 'Consolas', monospace; }

        .log-area {
            background: var(--bg); border: 1px solid var(--accent); border-radius: 5px;
            padding: 8px; font-family: 'Consolas', monospace; font-size: 11px;
            color: var(--dim); max-height: 200px; overflow-y: auto; white-space: pre-wrap;
        }
        .input-row { display: flex; gap: 8px; align-items: center; margin-bottom: 10px; }
        .input-row label { font-size: 12px; color: var(--dim); min-width: 80px; }
        .input-row input {
            flex: 1; padding: 6px 8px; background: var(--bg); border: 1px solid var(--accent);
            color: var(--text); border-radius: 4px; font-family: monospace; font-size: 12px;
        }
        .badge { display: inline-block; padding: 2px 6px; border-radius: 3px; font-size: 10px; }
        .badge-ok { background: #2e7d32; color: #fff; }
        .badge-missing { background: #424242; color: #999; }
        .badge-converting { background: #e65100; color: #fff; animation: pulse 1s infinite; }
        .badge-error { background: #b71c1c; color: #fff; }
        .badge-skipped { background: #37474f; color: #aaa; }
        @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.6; } }
    </style>
</head>
<body>
<div class="header">
    <h1>Process Data</h1>
    <a href="/">&larr; Back to Dashboard</a>
</div>

<div class="content">
    <div class="card">
        <h2>Rosbag Episodes</h2>
        <div id="rosbagInfo" style="color:var(--dim);font-size:12px;">Loading...</div>
        <div id="bagList"></div>
    </div>

    <div class="card">
        <h2>Dataset Status</h2>
        <div class="stat-grid">
            <div class="stat-box">
                <div class="label">Episodes</div>
                <div class="value" id="dsEpisodes">0</div>
            </div>
            <div class="stat-box">
                <div class="label">H5 Files</div>
                <div class="value" id="dsH5">0</div>
            </div>
            <div class="stat-box">
                <div class="label">Videos</div>
                <div class="value" id="dsVideos">0</div>
            </div>
            <div class="stat-box">
                <div class="label">Status</div>
                <div class="value" id="dsStatus" style="font-size:12px;color:var(--dim);">--</div>
            </div>
        </div>
        <div id="dsDir" style="font-size:11px;color:var(--dim);margin-bottom:8px;"></div>
    </div>

    <div class="card">
        <h2>Convert</h2>
        <div class="input-row">
            <label>Task Name:</label>
            <input type="text" id="taskName" value="teleop" placeholder="teleop">
        </div>
        <div class="input-row">
            <label>Threads:</label>
            <input type="number" id="numThreads" value="16" min="1" max="64" style="max-width:80px;">
        </div>
        <div style="display:flex;gap:8px;align-items:center;">
            <button class="btn btn-primary" id="btnConvert" onclick="runConvert()">Convert All</button>
            <button class="btn btn-danger" id="btnStop" onclick="stopConvert()" style="display:none;">Stop</button>
            <button class="btn btn-danger" id="btnDeleteAll" onclick="deleteAll()">Delete All Converted</button>
            <span id="convertProgress" style="font-size:12px;color:var(--dim);margin-left:8px;"></span>
        </div>
    </div>

    <div class="card">
        <h2>Log</h2>
        <div class="log-area" id="logArea">Ready.</div>
    </div>
</div>

<script>
let convertPollTimer = null;
let convertEpisodeStatus = {};  // bag_name -> {status, stage, total_stages, percent}
let cachedBags = [];  // cached bag list from last full loadStatus()

function addLog(msg) {
    const el = document.getElementById('logArea');
    const ts = new Date().toLocaleTimeString();
    el.textContent += '\n[' + ts + '] ' + msg;
    el.scrollTop = el.scrollHeight;
}

function getEpisodeBadge(bagName, isConverted) {
    // Check live conversion status first
    const live = convertEpisodeStatus[bagName];
    if (!live) {
        if (isConverted) return '<span class="badge badge-ok">Converted</span>';
        return '<span class="badge badge-missing">Not converted</span>';
    }
    const st = live.status;
    if (st === 'converting') {
        let label = 'Converting...';
        if (live.stage && live.total_stages) {
            label = `Stage ${live.stage}/${live.total_stages} ${live.percent || 0}%`;
        }
        return '<span class="badge badge-converting">' + label + '</span>';
    } else if (st === 'error') {
        return '<span class="badge badge-error">Error</span>';
    } else if (st === 'cancelled') {
        return '<span class="badge badge-missing">Cancelled</span>';
    } else if (st === 'converted' || isConverted) {
        return '<span class="badge badge-ok">Converted</span>';
    } else if (st === 'skipped') {
        return '<span class="badge badge-skipped">Skipped</span>';
    }
    return '<span class="badge badge-missing">Not converted</span>';
}

function loadStatus() {
    fetch('/api/process/status').then(r => r.json()).then(d => {
        // Rosbag episodes
        const bags = d.bags || [];
        cachedBags = bags;
        document.getElementById('rosbagInfo').textContent =
            d.rosbag_dir + ' \u2014 ' + bags.length + ' episodes';

        renderBagList(bags);

        // Dataset info
        const ds = d.dataset || {};
        document.getElementById('dsEpisodes').textContent = ds.episodes || 0;
        document.getElementById('dsH5').textContent = ds.h5_files || 0;
        document.getElementById('dsVideos').textContent = ds.videos || 0;
        document.getElementById('dsDir').textContent = 'Path: ' + d.dataset_dir;
        if (ds.exists) {
            document.getElementById('dsStatus').textContent = 'Ready';
            document.getElementById('dsStatus').style.color = 'var(--green)';
        } else {
            document.getElementById('dsStatus').textContent = 'Empty';
            document.getElementById('dsStatus').style.color = 'var(--dim)';
        }
    }).catch(e => {
        document.getElementById('rosbagInfo').textContent = 'Error: ' + e;
    });
}

function renderBagList(bags) {
    const list = document.getElementById('bagList');
    if (!bags || bags.length === 0) {
        list.innerHTML = '<div style="color:var(--dim);font-size:12px;padding:8px;">No episodes found.</div>';
        return;
    }
    list.innerHTML = bags.map((b, i) => {
        const status = getEpisodeBadge(b.name, b.converted);
        const topics = (b.topics || []).map(t =>
            '<span style="color:var(--dim);">' + t.name.split('/').pop() + '</span>: ' + t.count
        ).join(', ');

        let dsHtml = '';
        if (b.converted && b.dataset) {
            const ds = b.dataset;
            const h5ds = (ds.h5_datasets || []).filter(d =>
                !d.name.startsWith('meta/')
            ).map(d =>
                '<span style="color:var(--blue);">' + d.name + '</span> ' + JSON.stringify(d.shape) + ' ' + d.dtype
            ).join('<br>');
            dsHtml = '<div style="margin-top:6px;padding:6px 8px;background:var(--bg);border-radius:4px;font-size:10px;">'
                + '<div style="color:var(--green);font-weight:600;margin-bottom:3px;">Converted Data</div>'
                + '<div>Frames: ' + ds.frames + ' &nbsp; H5: ' + (ds.h5_size_mb || '?') + ' MB'
                + (ds.has_video ? ' &nbsp; Video: ' + (ds.video_size_mb || '?') + ' MB' : ' &nbsp; <span style="color:var(--red);">No video</span>')
                + '</div>'
                + (h5ds ? '<div style="margin-top:4px;font-family:monospace;line-height:1.6;">' + h5ds + '</div>' : '')
                + '</div>';
        }

        return '<div style="border:1px solid var(--accent);border-radius:6px;padding:8px 12px;margin-top:6px;">'
            + '<div style="display:flex;justify-content:space-between;align-items:center;">'
            + '<span style="font-weight:600;font-size:12px;">#' + i + ' ' + b.name + '</span>'
            + '<span>' + status + ' <span style="color:var(--dim);font-size:11px;">' + b.size_mb + ' MB</span></span>'
            + '</div>'
            + '<div style="font-size:11px;color:var(--dim);margin-top:4px;">'
            + 'Duration: ' + b.duration + 's &nbsp; Messages: ' + b.total_messages
            + '</div>'
            + '<div style="font-size:11px;margin-top:2px;">'
            + 'Topics: ' + (topics || 'none')
            + '</div>'
            + dsHtml
            + '</div>';
    }).join('');
}

function pollConvertStatus() {
    fetch('/api/process/convert_status').then(r => r.json()).then(d => {
        const episodes = d.episodes || {};
        let converting = 0, converted = 0, errors = 0, skipped = 0;

        // Update live status map and count
        for (const [name, info] of Object.entries(episodes)) {
            const prev = convertEpisodeStatus[name];
            const prevStatus = prev ? prev.status : null;
            convertEpisodeStatus[name] = info;
            if (prevStatus !== info.status) {
                if (info.status === 'converting' && !prevStatus) {
                    addLog('Converting: ' + name);
                } else if (info.status === 'converted') {
                    addLog('Converted: ' + name);
                } else if (info.status === 'error') {
                    addLog('ERROR: ' + name);
                } else if (info.status === 'cancelled') {
                    addLog('Cancelled: ' + name);
                }
            }
            if (info.status === 'converting') converting++;
            else if (info.status === 'converted') converted++;
            else if (info.status === 'error') errors++;
            else if (info.status === 'skipped') skipped++;
        }

        const total = Object.keys(episodes).length;
        const progEl = document.getElementById('convertProgress');
        progEl.textContent = d.converting
            ? `Progress: ${converted}/${total} done, ${converting} active, ${errors} errors`
            : '';

        // Re-render bag list from cache with updated live badges (no server fetch)
        renderBagList(cachedBags);

        if (!d.converting && convertPollTimer) {
            clearInterval(convertPollTimer);
            convertPollTimer = null;
            const btn = document.getElementById('btnConvert');
            const btnStop = document.getElementById('btnStop');
            btn.disabled = false;
            btn.textContent = 'Convert All';
            btnStop.style.display = 'none';
            btnStop.disabled = false;
            btnStop.textContent = 'Stop';
            if (d.result) {
                if (d.result.success) {
                    addLog('Conversion complete! Converted: ' + (d.result.converted || 0)
                        + ', Skipped: ' + (d.result.skipped || 0)
                        + ', Errors: ' + (d.result.errors || 0)
                        + ', Total episodes: ' + (d.result.total_episodes || 0));
                } else {
                    addLog('Conversion failed: ' + (d.result.error || 'unknown'));
                }
            }
            // Full reload to get updated dataset info
            loadStatus();
        }
    }).catch(() => {});
}

function runConvert() {
    const btn = document.getElementById('btnConvert');
    const btnStop = document.getElementById('btnStop');
    btn.disabled = true;
    btn.textContent = 'Converting...';
    btnStop.style.display = '';
    const taskName = document.getElementById('taskName').value.trim() || 'teleop';
    const numThreads = parseInt(document.getElementById('numThreads').value) || 16;
    convertEpisodeStatus = {};
    addLog('Starting conversion (threads=' + numThreads + ')...');

    fetch('/api/process/convert', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({task_name: taskName, num_threads: numThreads})
    }).then(r => r.json()).then(d => {
        if (d.success) {
            addLog('Conversion started with ' + (d.num_threads || numThreads) + ' threads');
            // Start polling for progress
            if (convertPollTimer) clearInterval(convertPollTimer);
            convertPollTimer = setInterval(pollConvertStatus, 1000);
        } else {
            btn.disabled = false;
            btn.textContent = 'Convert All';
            btnStop.style.display = 'none';
            addLog('ERROR: ' + d.error);
        }
    }).catch(e => {
        btn.disabled = false;
        btn.textContent = 'Convert All';
        btnStop.style.display = 'none';
        addLog('ERROR: ' + e);
    });
}

function stopConvert() {
    const btnStop = document.getElementById('btnStop');
    btnStop.disabled = true;
    btnStop.textContent = 'Stopping...';
    addLog('Stopping conversion...');
    fetch('/api/process/convert/stop', {method: 'POST'}).then(r => r.json()).then(d => {
        if (d.success) {
            addLog('Stop requested — cleaning up incomplete files...');
        } else {
            addLog('Stop error: ' + (d.error || 'unknown'));
        }
    }).catch(e => addLog('Stop error: ' + e));
}

function deleteAll() {
    if (!confirm('Delete ALL converted data (H5, videos, episode JSONs, meta)? Rosbags will NOT be deleted.')) return;
    addLog('Deleting converted data...');
    fetch('/api/process/delete_all', {method: 'POST'}).then(r => r.json()).then(d => {
        if (d.success) {
            addLog('Deleted: ' + d.message);
            convertEpisodeStatus = {};
            loadStatus();
        } else {
            addLog('ERROR: ' + d.error);
        }
    }).catch(e => addLog('ERROR: ' + e));
}

// On page load: check conversion first (fast in-memory endpoint), then load bags
function initPage() {
    // Step 1: fast check if conversion is running (in-memory, no disk I/O)
    fetch('/api/process/convert_status').then(r => r.json()).then(d => {
        if (d.converting) {
            const episodes = d.episodes || {};
            for (const [name, info] of Object.entries(episodes)) {
                convertEpisodeStatus[name] = info;
            }
            document.getElementById('btnConvert').disabled = true;
            document.getElementById('btnConvert').textContent = 'Converting...';
            document.getElementById('btnStop').style.display = '';
            addLog('Conversion in progress (resumed view)');
            if (!convertPollTimer) {
                convertPollTimer = setInterval(pollConvertStatus, 1000);
            }
            // During conversion, build bag list from convert_status episodes
            // (avoid disk-heavy /api/process/status entirely)
            const bagNames = Object.keys(episodes).sort();
            cachedBags = bagNames.map(name => ({
                name: name,
                size_mb: 0,
                converted: false,
                topics: [],
                duration: 0,
                total_messages: 0,
                dataset: null,
            }));
            document.getElementById('rosbagInfo').textContent =
                bagNames.length + ' episodes (loading details after conversion...)';
            document.getElementById('dsStatus').textContent = 'Converting';
            document.getElementById('dsStatus').style.color = 'var(--orange)';
            renderBagList(cachedBags);
        } else {
            // Not converting — safe to load full status
            loadStatus();
        }
    }).catch(() => {
        // Fallback: try full status
        loadStatus();
    });
}

initPage();
</script>
</body>
</html>
